services:
  jobtrail-compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  postgres:
    image: "docker.io/library/postgres:18.3"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql"
        source: "jobtrail.apphost-415199930d-postgres-data"
        read_only: false
    networks:
      - "aspire"
  cache:
    image: "docker.io/library/redis:8.6"
    command:
      - "-c"
      - "redis-server --requirepass $$REDIS_PASSWORD"
    entrypoint:
      - "/bin/sh"
    environment:
      REDIS_PASSWORD: "${CACHE_PASSWORD}"
    expose:
      - "6379"
    networks:
      - "aspire"
  api:
    image: "${API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${API_PORT}"
      ConnectionStrings__jobtrail: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=jobtrail"
      JOBTRAIL_HOST: "postgres"
      JOBTRAIL_PORT: "5432"
      JOBTRAIL_USERNAME: "postgres"
      JOBTRAIL_PASSWORD: "${POSTGRES_PASSWORD}"
      JOBTRAIL_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/jobtrail"
      JOBTRAIL_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/jobtrail"
      JOBTRAIL_DATABASENAME: "jobtrail"
      ConnectionStrings__cache: "cache:6379,password=${CACHE_PASSWORD}"
      CACHE_HOST: "cache"
      CACHE_PORT: "6379"
      CACHE_PASSWORD: "${CACHE_PASSWORD}"
      CACHE_URI: "redis://:${CACHE_PASSWORD}@cache:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jobtrail-compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "api"
    expose:
      - "${API_PORT}"
    depends_on:
      postgres:
        condition: "service_started"
      cache:
        condition: "service_started"
    networks:
      - "aspire"
  worker:
    image: "${WORKER_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ConnectionStrings__jobtrail: "Host=postgres;Port=5432;Username=postgres;Password=${POSTGRES_PASSWORD};Database=jobtrail"
      JOBTRAIL_HOST: "postgres"
      JOBTRAIL_PORT: "5432"
      JOBTRAIL_USERNAME: "postgres"
      JOBTRAIL_PASSWORD: "${POSTGRES_PASSWORD}"
      JOBTRAIL_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/jobtrail"
      JOBTRAIL_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres:5432/jobtrail"
      JOBTRAIL_DATABASENAME: "jobtrail"
      ConnectionStrings__cache: "cache:6379,password=${CACHE_PASSWORD}"
      CACHE_HOST: "cache"
      CACHE_PORT: "6379"
      CACHE_PASSWORD: "${CACHE_PASSWORD}"
      CACHE_URI: "redis://:${CACHE_PASSWORD}@cache:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jobtrail-compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "worker"
    depends_on:
      postgres:
        condition: "service_started"
      cache:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  jobtrail.apphost-415199930d-postgres-data:
    driver: "local"
