name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # A new push to a branch makes the in-flight run for that branch obsolete.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # Reads the pinned SDK band from global.json rather than restating it
          # here, so CI and a developer machine resolve the same analyzers.
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        # Analyzers run as part of the build. TreatWarningsAsErrors means any
        # analyzer or compiler warning fails this step - that is the gate.
        run: dotnet build --no-restore --configuration Release

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore

      # No test step yet, deliberately.
      #
      # The architecture rules cannot evaluate against modules that contain no
      # types, and the rule engine fails an unevaluable rule rather than passing
      # it, so the suite is currently red by design (ADR-0007). Gating on it
      # today would mean a permanently failing check, and a check that is always
      # red teaches everyone to ignore every check.
      #
      # The test gate is added by the change that turns the suite green - the
      # first module to carry real types - not before.
