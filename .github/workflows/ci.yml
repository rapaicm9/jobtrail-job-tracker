name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # A new push to a branch makes the in-flight run for that branch obsolete.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # Reads the pinned SDK band from global.json rather than restating it
          # here, so CI and a developer machine resolve the same analyzers.
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        # Analyzers run as part of the build. TreatWarningsAsErrors means any
        # analyzer or compiler warning fails this step - that is the gate.
        run: dotnet build --no-restore --configuration Release

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore

      - name: Test
        # The full test pyramid: unit + integration + architecture rules, reusing
        # the Release build above. Integration tests stand up real PostgreSQL and
        # Redis through Testcontainers, which talks to the Docker daemon that
        # ubuntu-latest ships preinstalled - no extra runner setup needed. A
        # failing test fails the gate; coverage is information, never a gate.
        run: dotnet test --no-build --no-restore --configuration Release
